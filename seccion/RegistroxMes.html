<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro por mes | Billsoft</title>
  <link rel=icon type=image/png href="../assets/img/favicon.png">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles_main.css">
</head>

<body>
  <nav class="navbar navbar-expand-lg navbar-dark bs-navbar fixed-top shadow py-2" aria-label="Navegación principal">
    <div class="container-fluid">

      <a class="navbar-brand d-flex align-items-center gap-2 py-0" href="../index.html#inicio">
        <img src="../assets/img/index/logo.svg" alt="Logo Billsoft" width="40" height="40">
        <span class="fw-bold fs-5 navbar-brand-text">Billsoft</span>
      </a>

      <div class="d-flex align-items-center">
        <a class="btn btn-outline-light btn-sm p-2" href="IngresoGasto.html">Ingresar Gastos <i
            class="bi bi-arrow-left-circle-fill mx-1"></i></a>
        <span class="ms-3"><img class="avatar-usr rounded-circle" src="../assets/img/app/user_fake.avif"
            alt="Avatar del usuario"></span>
        <p class="d-none d-md-flex text-center m-0 px-2 nombre-usr">Guillermo Diaz</p>

      </div>
    </div>
  </nav>
  <main>
<section class="container my-6 pb-6 pt-2">
  <div class="table-responsive shadow-sm rounded border">
    <table class="table table-striped-rows table-hover align-middle m-0">
      <thead class="tabla-gasto"> <tr class="Meses">
          <th scope="col" style="width: 50px;"></th> <th scope="col">Mes Anterior</th> <th scope="col">Mes Actual</th>   </tr>
      </thead>
      <tbody>
        <tr class="Gasto text-center">
          <th scope="row" class="text-muted text-center">Cantidad de dinero gastado $</th>
          <td class="fw-medium">900.000 $</td>
          <td class="fw-bold ">800.000 $</td> </tr>
      </tbody>
      <tbody>
        <tr class="Gasto text-center">
          <th scope="row" class="text-muted text-center">Porcentaje de gasto %</th>
          <td class="fw-medium">50%</td>
          <td class="fw-bold ">-11,11%</td> </tr>
      </tbody>
      <tbody>
        <tr class="Gasto text-center">
          <th scope="row" class="text-muted">Clasificacion</th>
          
          <td class="fw-medium">
            <span class="badge text-bg-warning rounded-pill px-3 py-2 text-dark border border-warning-subtle">Debes mejorar para el proximo mes <i class="bi bi-exclamation-triangle ms-1"></i></span>
          </td>
          
          <!-- Usamos text-bg-success para el fondo verde -->
          <td class="fw-bold">
            <span class="badge text-bg-success rounded-pill px-3 py-2 text-white border border-success-subtle">Estas mejorando <i class="bi bi-check-lg ms-1"></i></span>
          </td> 
          
        </tr>
      </tbody>
    </table>
  </div>
</section>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
