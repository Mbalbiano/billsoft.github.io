<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/styles_main.css">
    <title>Document</title>
</head>
<body>
<main>
<section>
<h1>Registrarse</h1>
</section>
<form method="post" class="formulario2 container mt-4">
<section class="column justify-content-center">
<div class="col-12 col-sm-10 col-md-8 col-lg-8">
<label class="texto">Ingrese su nombre:</label>
<br>
<input type="text" name="Nombre" class="inputs mb-3 w-50" placeholder="Ingrese su nombre">
<br>
<label class="texto">Ingrese su apellido:</label>
<br>
<input type="text" name="Apellido" class="inputs mb-3 w-50" placeholder="Ingrese su apellido">
<br>
<label class="texto">Ingrese su correo electronico:</label>
<br>
<input type="email" name="Email" class="inputs mb-3 w-50" placeholder="Ingrese su email">
<br>
<label class="texto">Ingrese su contraseña:</label>
<br>
<input type="password" name="Contraseña" class="inputs mb-3 w-50" placeholder="Ingrese su contraseña">
<br>
<label class="texto">Confirme su contraseña:</label>
<br>
<input type="password" name="Confirmacion" class="inputs mb-3 w-50" placeholder="Ingrese de nuevo su contraseña">
<br>
<br>
<button type="submit" class="btn btn-dark w-50">Registrarse</button>
<br>
</div>
</section>
</form>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/JS/Validacion.js"></script>
</body>
</html>
