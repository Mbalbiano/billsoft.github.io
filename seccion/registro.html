<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrarse | Billsoft</title>
  <link rel=icon type=image-icon href="../assets/img/favicon.png">

  <link rel="stylesheet" href="../assets/css/styles_main.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
  <main>
    <div class="container-fluid p-0">
      <div class="row g-0 min-vh-100">
        
        <div class="d-none d-md-block col-md-7 col-lg-8 bg-img-cta" style="background-image: url('../assets/img/app/background.jpg'); background-size: cover; background-position: center;">
        </div>

        <div class="col-12 col-md-5 col-lg-4 border-3 d-flex justify-content-center align-items-center color-block">

          <div class="w-100 px-3 px-md-5 py-4"> 
            <form method="post" class="formulario2">
              
              <div class="d-flex flex-column align-items-center mb-3">
                <img src="../assets/img/index/logo.svg" class="img-fluid w-50" alt="Logo de Billsoft">
                <h2 class="mt-0 mb-3 txt-cta">Billsoft</h2>
              </div>
              
              <h3 class="mb-3 text-white font-weight-bold">Crear Cuenta</h3>
              
              <div class="row g-2 mb-2">
                <div class="col-6">
                  <label class="texto text-white mb-1">Nombre:</label>
                  <input type="text" name="Nombre" class="form-control shadow-lg" placeholder="Su nombre" required>
                </div>
                <div class="col-6">
                  <label class="texto text-white mb-1">Apellido:</label>
                  <input type="text" name="Apellido" class="form-control shadow-lg" placeholder="Su apellido" required>
                </div>
              </div>
              
              <label class="texto text-white mb-1 mt-2">Correo electrónico:</label>
              <input type="email" name="Email" class="form-control mb-3 shadow-lg" placeholder="Ingrese su email" required>
              
              <label class="texto text-white mb-1">Contraseña:</label>
              <input type="password" name="Contraseña" class="form-control mb-3 shadow-lg" placeholder="Ingrese su contraseña" required>
              
              <label class="texto text-white mb-1">Confirme su contraseña:</label>
              <input type="password" name="Confirmacion" class="form-control mb-4 shadow-lg" placeholder="Repita su contraseña" required>
              
              <div class="d-grid gap-2 mt-2">
                <button type="submit" class="btn-accent py-2 shadow">Registrarse</button>
              </div>
              
              <div class="d-flex gap-2 mt-3">

                <a href="login.html" class="btn btn-outline-light w-50 py-2 shadow">Iniciar Sesión</a>
                <a href="../index.html" class="btn btn-outline-light w-50 py-2 shadow">Volver</a>
              </div>
              
            </form>
          </div>

        </div>
      </div>
    </div>
  </main>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/JS/Validacion.js"></script>
</body>

</html>
