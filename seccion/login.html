<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../assets/css/styles_main.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<main>
<section class="mt-2 mb-2">
<h3 class="mb-0">Iniciar Sesion</h3>
</section>
<form method="post" class="formulario3 container mt-2">
<section class="column justify-content-center">
<div class="col-12 col-sm-10 col-md-8 col-lg-8">
<label class="texto">Ingrese su correo electronico:</label>
<br>
<input type="email" name="Email2" class="inputs mb-4 w-50" placeholder="Ingrese su email" required>
<br>
<label class="texto">Ingrese su contraseña:</label>
<br>
<input type="password" name="Contraseña2" class="inputs mb-5 w-50" placeholder="Ingrese su contraseña" required>
<br>
<div class="d-flex flex-column flex-sm-row gap-2 justify-content-start mt-2">
  <button type="submit" class="btn btn-dark px-4 py-2">Iniciar Sesion</button>
  <a href="registro.html" class="btn btn-dark px-4 py-2">Crear Cuenta</a>
</div>
<br>
</div>
</section>
</form>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/JS/Validacion.js"></script>
</body>
</html>
