<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="../assets/css/styles_main.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
  <main>
<div class="container-fluid p-0">
  <div class="row g-0 min-vh-100">
    
    <div class="d-none d-md-block col-md-7 col-lg-8 bg-img-cta" style="background-image: url('../assets/img/app/background.jpg'); background-size: cover; background-position: center;">
        </div>

    <div class="col-12 col-md-5 col-lg-4 border-3 d-flex justify-content-center align-items-center color-block">
      
      <div class="w-100 px-2 px-md-5">
        <form method="post" class="formulario3">
          <div class="d-flex flex-column justi align-items-center mb-3">
            <img src="../assets/img/index/logo.svg" class="img-fluid w-50" alt="Logo de Billsoft">
             <h2 class="mt-0 mb-4 txt-cta">Billsoft</h2>
              </div>
          <h3 class="mb-4 text-white font-weight-bold">Iniciar Sesión</h3>
          
          <label class="texto text-white mb-1">Ingrese su correo electrónico:</label>
          <input type="email" name="Email2" class="form-control mb-3 shadow-lg" placeholder="Ingrese su email" required>
          
          <label class="texto text-white mb-1">Ingrese su contraseña:</label>
          <input type="password" name="Contraseña2" class="form-control mb-4 shadow-lg" placeholder="Ingrese su contraseña" required>
          
          <div class="d-grid gap-2">
            <button type="submit" class="btn-accent py-2 shadow">Iniciar Sesión</button>
          </div>
          
          <div class="d-flex gap-2 mt-2">
            <a type="button" class="btn btn-outline-light w-50 py-2 shadow" href="registro.html">Crear Cuenta</a>
            <a type="button" class="btn btn-outline-light w-50 py-2 shadow" href="../index.html">Volver</a>
          </div>
          
        </form>
      </div>

    </div>
  </div>
</div>

  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/JS/Validacion.js"></script>
</body>

</html>
