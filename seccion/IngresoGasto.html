<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingreso Gasto</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/styles_main.css">

</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark bs-navbar fixed-top shadow py-1" aria-label="Navegación principal">
  <div class="container-fluid">

    <a class="navbar-brand d-flex align-items-center gap-2 py-0" href="../index.html#inicio">
      <img src="../assets/img/index/logo.svg" alt="Logo Billsoft" width="40" height="40">
      <span class="fw-bold fs-5 navbar-brand-text">Billsoft</span>
    </a>

      <div class="d-flex align-items-center">
        <a class="btn btn-outline-light btn-sm p-2" href="../seccion/RegistroxMes.html">Registro por mes <i class="bi bi-arrow-right-circle-fill"></i></a>
        <span class="ms-3"><img class="avatar-usr rounded-circle" src="../assets/img/app/user_fake.avif" alt="Avatar del usuario"></span>
        <p class="d-none d-md-flex text-center m-0 px-2 nombre-usr">Guillermo Diaz</p>
      
      </div>
    </div>

  </div>
</nav>

  <main style="min-height: 180vh;">
    <section class="container my-5 py-4">
      <div class="table-responsive shadow-sm rounded border" style="overflow: visible;">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-dark">
            <tr>
              <th scope="col" class="ps-3">Detalle / Producto</th>
              <th scope="col">Categoría</th>
              <th scope="col" class="text-end">Precio</th>
              <th scope="col" class="text-center" style="width: 80px;">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td class="ps-3 fw-medium">Cuenta de luz</td>
              <td><span class="badge bg-secondary">servicio</span></td>
              <td class="text-end fw-bold">$42.000</td>
              <td class="text-center">
                <div class="d-md-none">
                  <div class="dropdown">
                    <button class="btn btn-sm btn-outline-secondary dropdown-toggle" type="button"
                      data-bs-toggle="dropdown" aria-expanded="false" title="Acciones">
                      <i class="bi bi-three-dots"></i>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end position-absolute" style="top: 100%; right: 0;">
                      <li><button class="dropdown-item" type="button">Editar</button></li>
                      <li><button class="dropdown-item text-danger" type="button">Eliminar</button></li>
                    </ul>
                  </div>
                </div>

                <div class="d-none d-md-inline">
                  <button class="btn btn-sm btn-outline-danger" title="Eliminar">
                    <i class="bi bi-trash"></i>
                  </button>
                  <button class="btn btn-sm btn-outline-secondary" title="Editar">
                    <i class="bi bi-pencil-square"></i>
                  </button>
                </div>
              </td>
            </tr>
          </tbody>
          <tbody>
          </tbody>
        </table>
      </div>
    </section>

    <div class="fixed-bottom" style="padding-bottom: 2rem;">
      <form method="post" class="container mt-4 mb-3 pb-2">
        <div class="border rounded p-3 bg-light shadow">
          <div class="text-center mb-3">
            <label class="fw-semibold">Ingrese sus gastos</label>
          </div>

          <div class="row justify-content-center align-items-end g-3">
            <div class="col-12 col-md-3">
              <input type="text" class="form-control" id="compra" name="NombreCompra" placeholder="Nombre del producto"
                required>
            </div>

            <div class="col-12 col-md-3">
              <select class="form-select" name="Categoria" id="Categoria" required>
                <option value="" selected>Elija una opcion</option>
                <option value="Servicio">Servicio</option>
                <option value="Alquiler">Alquiler</option>
                <option value="Comida">Comida</option>
                <option value="Calzado">Calzado</option>
                <option value="Ropa">Ropa</option>
                <option value="Vehiculo Propio">Vehiculo Propio</option>
                <option value="Suscripciones">Suscripciones</option>
                <option value="Seguros">Seguros</option>
                <option value="Otros">Otros</option>
              </select>
            </div>

            <div class="col-12 col-md-3">
              <input type="number" class="form-control" id="Precio" name="PrecioCompra"
                placeholder="Ingrese el precio del producto" min="0" step="0.01" required>
            </div>

            <div class="col-12 col-md-2 d-flex justify-content-center">
              <button type="submit" class="btn btn-primary w-100">Añadir gasto</button>
            </div>
          </div>
        </div>
      </form>
    </div>


  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/JS/Validacion.js"></script>
</body>

</html>
